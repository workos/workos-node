name: CI

on:
  push:
    branches:
      - 'main'
  pull_request: {}

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install Dependencies
        run: |
          npm install

      - name: Prettier
        run: |
          npm run prettier

      - name: Lint
        run: |
          npm run lint

      - name: Typecheck
        run: |
          npm run typecheck

      - name: Build
        run: |
          npm run build

      - name: Test
        run: |
          npm run test
